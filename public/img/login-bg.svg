<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2c0f12" />
      <stop offset="50%" stop-color="#7a2229" />
      <stop offset="100%" stop-color="#0f0509" />
    </linearGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.8" numOctaves="1" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend mode="overlay"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)" />
  <g opacity="0.12" transform="translate(1400,200) rotate(-18)">
    <rect x="0" y="0" width="900" height="400" rx="40" fill="#000" />
  </g>
  <!-- sugerencia visual: herramientas difuminadas en el lateral derecho -->
  <g transform="translate(1220,220)" opacity="0.15">
    <circle cx="60" cy="60" r="60" fill="#d4af37" />
    <rect x="110" y="20" width="8" height="80" rx="4" fill="#fff" opacity="0.08" />
    <rect x="140" y="10" width="70" height="20" rx="8" fill="#fff" opacity="0.06" transform="rotate(-18 175 20)" />
  </g>
  <!-- ligera textura -->
  <rect width="100%" height="100%" fill="black" opacity="0.02" />
</svg>